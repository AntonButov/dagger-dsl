name: Generate Coverage Badge

on:
  push:
    branches: [ trunk ]
  pull_request:
    branches: [ trunk ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Важно для правильной работы с git history

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle and run tests with coverage
      run: ./gradlew build test jacocoTestReport

    - name: Generate Coverage Badge
      uses: cicirello/jacoco-badge-generator@v2
      with:
        jacoco-csv-file: ./dagger-dsl-processor/build/reports/jacoco/test/jacocoTestReport.csv
        badges-directory: .github/badges
        generate-branches-badge: true
        generate-summary: true

    - name: Commit and push badge if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .github/badges/
        git commit -m "Update coverage badge" || echo "No changes to commit"
        git push
        git push