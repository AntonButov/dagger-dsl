name: Update README with Latest Release

on:
  release:
    types: [published]

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get release version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update README manually
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Updating to version: $VERSION"
          
          cp README.md README.tmp
          
          while IFS= read -r line; do
            if [[ $line == *"io.github.antonbutov:dagger-dsl-processor"* ]]; then
              echo '    ksp("io.github.antonbutov:dagger-dsl-processor:'$VERSION'")' >> README.md.new
            elif [[ $line == *"io.github.antonbutov:dagger-dsl-core"* ]]; then
              echo '    implementation("io.github.antonbutov:dagger-dsl-core:'$VERSION'")' >> README.md.new
            else
              echo "$line" >> README.md.new
            fi
          done < README.tmp
          
          mv README.md.new README.md
          rm README.tmp
          
          if git diff --quiet README.md; then
            echo "No changes to README.md"
            echo "HAS_CHANGES=false" >> $GITHUB_OUTPUT
          else
            echo "README.md was updated"
            echo "HAS_CHANGES=true" >> $GITHUB_OUTPUT
          fi
        id: update_readme

      - name: Create Pull Request
        if: steps.update_readme.outputs.HAS_CHANGES == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'Update README with latest release version ${{ steps.get_version.outputs.VERSION }}'
          title: 'Update README for new release ${{ steps.get_version.outputs.VERSION }}'
          body: |
            This PR updates the README file with the latest release version ${{ steps.get_version.outputs.VERSION }}.
            
            Automatically generated by GitHub Actions.
          branch: 'update-readme'
          base: 'trunk'

      - name: Debug Information
        run: |
          echo "Current README content after update attempt:"
          cat README.md
          echo "---"
          echo "Latest release version: ${{ steps.get_version.outputs.VERSION }}"
          echo "---"
          echo "Git status:"
          git status