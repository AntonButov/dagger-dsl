[versions]
kotlin = "1.9.25"
ksp = "1.9.25-1.0.20"
kotest = "5.9.1"
compilation = "2.0.0"
ktlint = "12.2.0"
kotlinPoet = "1.18.0"
code-factory = "1.0.1"
dagger = "2.55"
mockk = "1.13.17"

[libraries]
kotest-core = { module = "io.kotest:kotest-assertions-core", version.ref = "kotest"}
kotest-runner = { module = "io.kotest:kotest-runner-junit5", version.ref = "kotest" }
compilation = { module = "com.github.antonbutov:compilation", version.ref = "compilation" }
ksp = { module = "com.google.devtools.ksp:symbol-processing-api", version.ref = "ksp" }
compile-embedded = { module = "org.jetbrains.kotlin:kotlin-compiler-embeddable", version.ref = "kotlin"}
kotlin-poet = { module = "com.squareup:kotlinpoet", version.ref = "kotlinPoet" }
code-factory = { module = "io.github.antonbutov:code-factory-processor", version.ref = "code-factory" }
dagger = { module = "com.google.dagger:dagger", version.ref = "dagger" }
mockk = { module = "io.mockk:mockk", version.ref = "mockk" }

[bundles]

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
ktlint = { id = "org.jlleitschuh.gradle.ktlint", version.ref = "ktlint" }
ksp = { id = "com.google.devtools.ksp", version.ref = "ksp" }

